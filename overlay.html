<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        /* Theme-overridable via IPC */
        --overlay-bg: 18, 18, 24;
        --overlay-text: 241, 245, 249;
        --overlay-text-muted: 148, 163, 184;
        --overlay-text-dim: 100, 116, 139;
        --overlay-brand: 99, 102, 241;
        --overlay-brand-light: 139, 92, 246;
        --overlay-success: 34, 197, 94;
        --overlay-success-dark: 22, 163, 74;
        --overlay-error: 239, 68, 68;
        --overlay-error-dark: 220, 38, 38;
        --overlay-border: 255, 255, 255;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: transparent;
        overflow: hidden;
        -webkit-app-region: no-drag;
        user-select: none;
      }

      /* Gaming overlay style - semi-transparent, minimal */
      .overlay-container {
        position: fixed;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 380px;
      }

      /* Message notification card */
      .overlay-card {
        background: rgba(var(--overlay-bg), 0.82);
        border: 1px solid rgba(var(--overlay-border), 0.06);
        border-radius: 16px;
        padding: 14px 16px;
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(var(--overlay-border), 0.04);
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        position: relative;
        animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        transition:
          transform 0.15s ease,
          background 0.15s ease;
      }

      .overlay-card:hover {
        background: rgba(var(--overlay-bg), 0.92);
        transform: translateX(4px);
      }

      .overlay-card.hiding {
        animation: slideOut 0.2s cubic-bezier(0.4, 0, 1, 1) forwards;
      }

      @keyframes slideIn {
        from {
          transform: translateX(-120%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        to {
          transform: translateX(-120%);
          opacity: 0;
        }
      }

      /* Call notification - more prominent */
      .overlay-card.call {
        background: rgba(var(--overlay-bg), 0.88);
        border-color: rgba(var(--overlay-success), 0.3);
        padding: 14px 16px;
        animation:
          slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1),
          callPulse 2s ease-in-out infinite;
      }

      @keyframes callPulse {
        0%,
        100% {
          box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.4),
            0 0 0 0 rgba(var(--overlay-success), 0.3);
        }
        50% {
          box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.4),
            0 0 0 8px rgba(var(--overlay-success), 0);
        }
      }

      /* Avatar */
      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgb(var(--overlay-brand)), rgb(var(--overlay-brand-light)));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 16px;
        flex-shrink: 0;
        position: relative;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Online indicator for calls */
      .avatar.calling::after {
        content: '';
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 12px;
        height: 12px;
        background: rgb(var(--overlay-success));
        border: 2px solid rgba(var(--overlay-bg), 0.9);
        border-radius: 50%;
        animation: ringPulse 1s ease-in-out infinite;
      }

      @keyframes ringPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      /* Content */
      .content {
        flex: 1;
        min-width: 0;
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        color: rgb(var(--overlay-text));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }

      .timestamp {
        font-size: 11px;
        color: rgb(var(--overlay-text-dim));
        flex-shrink: 0;
      }

      .body {
        font-size: 13px;
        color: rgb(var(--overlay-text-muted));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 3px;
        line-height: 1.4;
      }

      .click-hint {
        font-size: 10px;
        color: rgb(var(--overlay-text-dim));
        margin-top: 4px;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      .overlay-card:hover .click-hint {
        opacity: 1;
      }

      .call .body {
        color: rgb(var(--overlay-success));
        font-weight: 500;
      }

      /* Call action buttons */
      .call-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .call-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      .call-btn:hover {
        transform: scale(1.1);
      }

      .call-btn:active {
        transform: scale(0.95);
      }

      .call-btn.answer {
        background: linear-gradient(135deg, rgb(var(--overlay-success)), rgb(var(--overlay-success-dark)));
        color: white;
        box-shadow: 0 4px 12px rgba(var(--overlay-success), 0.3);
      }

      .call-btn.answer:hover {
        box-shadow: 0 6px 16px rgba(var(--overlay-success), 0.4);
      }

      .call-btn.decline {
        background: linear-gradient(135deg, rgb(var(--overlay-error)), rgb(var(--overlay-error-dark)));
        color: white;
        box-shadow: 0 4px 12px rgba(var(--overlay-error), 0.3);
      }

      .call-btn.decline:hover {
        box-shadow: 0 6px 16px rgba(var(--overlay-error), 0.4);
      }

      /* Close button */
      .close-btn {
        position: absolute;
        top: 6px;
        right: 8px;
        width: 16px;
        height: 16px;
        background: none;
        border: none;
        color: rgb(var(--overlay-text-dim));
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        opacity: 0;
        transition:
          opacity 0.15s ease,
          color 0.15s ease,
          background 0.15s ease;
      }

      .overlay-card:hover .close-btn {
        opacity: 1;
      }

      .close-btn:hover {
        color: rgb(var(--overlay-text));
        background: rgba(var(--overlay-border), 0.1);
      }

      /* Progress bar for auto-dismiss */
      .progress-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: linear-gradient(90deg, rgb(var(--overlay-brand)), rgb(var(--overlay-brand-light)));
        border-radius: 0 0 16px 16px;
        animation: progressShrink var(--duration, 5s) linear forwards;
      }

      .call .progress-bar {
        background: linear-gradient(90deg, rgb(var(--overlay-success)), rgb(var(--overlay-success-dark)));
      }

      @keyframes progressShrink {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }

      /* Quick reply (future) */
      .quick-reply {
        margin-top: 8px;
        display: none;
      }

      .overlay-card.expanded .quick-reply {
        display: block;
      }

      .quick-reply-input {
        width: 100%;
        background: rgba(var(--overlay-border), 0.05);
        border: 1px solid rgba(var(--overlay-border), 0.1);
        border-radius: 8px;
        padding: 8px 12px;
        color: rgb(var(--overlay-text));
        font-size: 12px;
        outline: none;
      }

      .quick-reply-input:focus {
        border-color: rgba(var(--overlay-brand), 0.5);
      }

      /* System toast (downloads, errors, etc) */
      .overlay-card.toast {
        background: rgba(var(--overlay-bg), 0.85);
        padding: 10px 14px;
      }

      .overlay-card.toast.success .progress-bar {
        background: rgb(var(--overlay-success));
      }

      .overlay-card.toast.error {
        border-color: rgba(var(--overlay-error), 0.3);
      }

      .overlay-card.toast.error .progress-bar {
        background: rgb(var(--overlay-error));
      }

      /* Toast icon */
      .toast-icon {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .toast-icon.success {
        background: rgba(var(--overlay-success), 0.15);
        color: rgb(var(--overlay-success));
      }

      .toast-icon.error {
        background: rgba(var(--overlay-error), 0.15);
        color: rgb(var(--overlay-error));
      }

      .toast-icon.info {
        background: rgba(var(--overlay-brand), 0.15);
        color: rgb(var(--overlay-brand));
      }

      /* Active call overlay - persistent while in call */
      .active-call-overlay {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: rgba(var(--overlay-bg), 0.88);
        border: 1px solid rgba(var(--overlay-success), 0.3);
        border-radius: 16px;
        padding: 12px 16px;
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          0 0 20px rgba(var(--overlay-success), 0.15),
          inset 0 1px 0 rgba(var(--overlay-border), 0.04);
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        min-width: 200px;
      }

      @keyframes slideUp {
        from {
          transform: translateY(100%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .active-call-overlay.hiding {
        animation: slideDown 0.2s ease-out forwards;
      }

      @keyframes slideDown {
        to {
          transform: translateY(100%);
          opacity: 0;
        }
      }

      .active-call-overlay:hover {
        background: rgba(var(--overlay-bg), 0.92);
      }

      .active-call-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgb(var(--overlay-success)), rgb(var(--overlay-success-dark)));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 14px;
        flex-shrink: 0;
        position: relative;
      }

      .active-call-avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Pulsing ring around avatar during call */
      .active-call-avatar::before {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 2px solid rgba(var(--overlay-success), 0.5);
        animation: callRing 1.5s ease-in-out infinite;
      }

      @keyframes callRing {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.2;
        }
      }

      .active-call-info {
        flex: 1;
        min-width: 0;
      }

      .active-call-name {
        font-size: 13px;
        font-weight: 600;
        color: rgb(var(--overlay-text));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .active-call-timer {
        font-size: 12px;
        color: rgb(var(--overlay-success));
        font-weight: 500;
        font-family: 'SF Mono', 'JetBrains Mono', monospace;
      }

      .active-call-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .active-call-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.15s ease,
          background 0.15s ease;
        background: rgba(var(--overlay-border), 0.1);
        color: rgb(var(--overlay-text));
      }

      .active-call-btn:hover {
        transform: scale(1.1);
        background: rgba(var(--overlay-border), 0.15);
      }

      .active-call-btn.muted {
        background: rgba(var(--overlay-error), 0.2);
        color: rgb(var(--overlay-error));
      }

      .active-call-btn.hangup {
        background: linear-gradient(135deg, rgb(var(--overlay-error)), rgb(var(--overlay-error-dark)));
        color: white;
      }

      .active-call-btn.hangup:hover {
        background: linear-gradient(135deg, rgb(var(--overlay-error)), rgb(var(--overlay-error)));
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .overlay-card,
        .overlay-card.hiding,
        .call-btn,
        .progress-bar,
        .active-call-overlay,
        .active-call-avatar::before {
          animation: none;
          transition: none;
        }
        .overlay-card.call {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay-container" id="container"></div>
    <script>
      const container = document.getElementById('container');
      let cardId = 0;
      const activeCards = new Map();

      // The overlay window covers the whole screen and is click-through by
      // default. Enable mouse events only while the cursor is over a card, so
      // clicks pass through to apps beneath everywhere else.
      const hoveredCards = new Set();
      function refreshInteractive() {
        if (window.overlayAPI.setInteractive) {
          window.overlayAPI.setInteractive(hoveredCards.size > 0);
        }
      }
      function registerInteractive(el) {
        el.addEventListener('pointerenter', () => {
          hoveredCards.add(el);
          refreshInteractive();
        });
        el.addEventListener('pointerleave', () => {
          hoveredCards.delete(el);
          refreshInteractive();
        });
      }
      function unregisterInteractive(el) {
        // Handles a card removed while the cursor is still over it (pointerleave
        // may not fire), so the window can revert to click-through.
        if (hoveredCards.delete(el)) refreshInteractive();
      }

      // Theme sync — update CSS custom properties when app theme changes
      if (window.overlayAPI.onThemeUpdate) {
        window.overlayAPI.onThemeUpdate((theme) => {
          const root = document.documentElement;
          if (theme.bg) root.style.setProperty('--overlay-bg', theme.bg);
          if (theme.text) root.style.setProperty('--overlay-text', theme.text);
          if (theme.textMuted) root.style.setProperty('--overlay-text-muted', theme.textMuted);
          if (theme.textDim) root.style.setProperty('--overlay-text-dim', theme.textDim);
          if (theme.brand) root.style.setProperty('--overlay-brand', theme.brand);
          if (theme.brandLight) root.style.setProperty('--overlay-brand-light', theme.brandLight);
          if (theme.success) root.style.setProperty('--overlay-success', theme.success);
          if (theme.error) root.style.setProperty('--overlay-error', theme.error);
        });
      }

      window.overlayAPI.onShowOverlay((data) => {
        createCard(data);
      });

      function createCard(data) {
        const id = ++cardId;
        const isCall = data.type === 'call';
        const isToast = data.type === 'toast';
        const duration = data.duration || (isCall ? 30000 : 5000);

        const card = document.createElement('div');
        card.className = `overlay-card ${data.type || ''} ${data.variant || ''}`;
        card.id = `card-${id}`;
        card.style.setProperty('--duration', `${duration}ms`);

        let html = '';
        // Fallback initial for a broken avatar image (set as textContent, never
        // interpolated into inline JS).
        let avatarInitial = '';

        // Close button
        html += `<button class="close-btn" onclick="event.stopPropagation(); dismissCard(${id});">&times;</button>`;

        if (isToast) {
          // Toast notification
          const iconClass = data.variant || 'info';
          const icons = {
            success:
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
            error:
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
            info: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
          };
          html += `<div class="toast-icon ${iconClass}">${icons[iconClass] || icons.info}</div>`;
          html += `<div class="content">`;
          html += `<div class="title">${escapeHtml(data.title || 'Notification')}</div>`;
          if (data.body) html += `<div class="body">${escapeHtml(data.body)}</div>`;
          html += `</div>`;
        } else {
          // Message or call notification
          avatarInitial = (data.title || '?').charAt(0).toUpperCase();
          if (data.avatar) {
            html += `<div class="avatar ${isCall ? 'calling' : ''}"><img src="${escapeHtml(data.avatar)}" alt=""></div>`;
          } else {
            html += `<div class="avatar ${isCall ? 'calling' : ''}">${escapeHtml(avatarInitial)}</div>`;
          }

          html += `<div class="content">`;
          html += `<div class="title-row">`;
          html += `<div class="title">${escapeHtml(data.title || 'Aetherium')}</div>`;
          html += `<div class="timestamp">just now</div>`;
          html += `</div>`;
          html += `<div class="body">${escapeHtml(data.body || (isCall ? 'Incoming call...' : ''))}</div>`;
          if (!isCall) {
            html += `<div class="click-hint">Click to open</div>`;
          }
          html += `</div>`;

          // Call buttons
          if (isCall) {
            html += `<div class="call-actions">`;
            html += `<button class="call-btn answer" onclick="event.stopPropagation(); answerCall(${id});" title="Answer">`;
            html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
            html += `</button>`;
            html += `<button class="call-btn decline" onclick="event.stopPropagation(); declineCall(${id});" title="Decline">`;
            html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="22" y1="2" x2="2" y2="22"/></svg>`;
            html += `</button>`;
            html += `</div>`;
          }
        }

        // Progress bar (auto-dismiss indicator)
        html += `<div class="progress-bar"></div>`;

        card.innerHTML = html;

        // Safe avatar fallback: set the initial via textContent on load error.
        const avatarImg = card.querySelector('.avatar img');
        if (avatarImg) {
          avatarImg.onerror = () => {
            avatarImg.style.display = 'none';
            avatarImg.parentNode.textContent = avatarInitial;
          };
        }

        card.onclick = () => handleCardClick(id, data);
        container.appendChild(card);
        registerInteractive(card);

        activeCards.set(id, { card, data, timeout: setTimeout(() => dismissCard(id), duration) });
      }

      function handleCardClick(id, data) {
        const entry = activeCards.get(id);
        if (!entry) return;

        if (data.type !== 'call') {
          window.overlayAPI.sendOverlayClicked(data);
          dismissCard(id);
        }
      }

      function answerCall(id) {
        window.overlayAPI.sendAnswerCall();
        dismissCard(id);
      }

      function declineCall(id) {
        window.overlayAPI.sendDeclineCall();
        dismissCard(id);
      }

      function dismissCard(id) {
        const entry = activeCards.get(id);
        if (!entry) return;

        clearTimeout(entry.timeout);
        unregisterInteractive(entry.card);
        entry.card.classList.add('hiding');

        setTimeout(() => {
          entry.card.remove();
          activeCards.delete(id);

          // If no more cards, tell main process to close overlay window
          if (activeCards.size === 0) {
            window.overlayAPI.sendDismiss();
          }
        }, 200);
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Expose dismiss for external calls
      window.dismissCard = dismissCard;

      // ============================================
      // Active Call Overlay
      // ============================================
      let activeCallElement = null;
      let callTimerInterval = null;
      let callStartTime = null;
      let isMuted = false;

      window.overlayAPI.onShowActiveCall((data) => {
        showActiveCall(data);
      });

      window.overlayAPI.onUpdateActiveCall((data) => {
        updateActiveCall(data);
      });

      window.overlayAPI.onHideActiveCall(() => {
        hideActiveCall();
      });

      function showActiveCall(data) {
        hideActiveCall(); // Remove existing if any

        callStartTime = data.startTime ? new Date(data.startTime) : new Date();
        isMuted = data.isMuted || false;

        const el = document.createElement('div');
        el.className = 'active-call-overlay';
        el.id = 'active-call';
        el.onclick = () => window.overlayAPI.sendActiveCallClicked();

        let html = '';
        const avatarInitial = (data.name || '?').charAt(0).toUpperCase();

        // Avatar
        if (data.avatar) {
          html += `<div class="active-call-avatar"><img src="${escapeHtml(data.avatar)}" alt=""></div>`;
        } else {
          html += `<div class="active-call-avatar">${escapeHtml(avatarInitial)}</div>`;
        }

        // Info
        html += `<div class="active-call-info">`;
        html += `<div class="active-call-name">${escapeHtml(data.name || 'Call')}</div>`;
        html += `<div class="active-call-timer" id="call-timer">00:00</div>`;
        html += `</div>`;

        // Actions
        html += `<div class="active-call-actions">`;
        html += `<button class="active-call-btn ${isMuted ? 'muted' : ''}" id="mute-btn" onclick="event.stopPropagation(); toggleMute();" title="${isMuted ? 'Unmute' : 'Mute'}">`;
        html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">`;
        if (isMuted) {
          html += `<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
        } else {
          html += `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
        }
        html += `</svg></button>`;
        html += `<button class="active-call-btn hangup" onclick="event.stopPropagation(); hangupCall();" title="End Call">`;
        html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="22" y1="2" x2="2" y2="22"/></svg>`;
        html += `</button>`;
        html += `</div>`;

        el.innerHTML = html;

        // Safe avatar fallback: set the initial via textContent on load error.
        const avatarImg = el.querySelector('.active-call-avatar img');
        if (avatarImg) {
          avatarImg.onerror = () => {
            avatarImg.style.display = 'none';
            avatarImg.parentNode.textContent = avatarInitial;
          };
        }

        document.body.appendChild(el);
        registerInteractive(el);
        activeCallElement = el;

        // Start timer
        updateCallTimer();
        callTimerInterval = setInterval(updateCallTimer, 1000);
      }

      function updateActiveCall(data) {
        if (!activeCallElement) return;

        if (typeof data.isMuted === 'boolean' && data.isMuted !== isMuted) {
          isMuted = data.isMuted;
          const muteBtn = document.getElementById('mute-btn');
          if (muteBtn) {
            muteBtn.className = `active-call-btn ${isMuted ? 'muted' : ''}`;
            muteBtn.title = isMuted ? 'Unmute' : 'Mute';
            // Update icon
            let iconHtml = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">`;
            if (isMuted) {
              iconHtml += `<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
            } else {
              iconHtml += `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
            }
            iconHtml += `</svg>`;
            muteBtn.innerHTML = iconHtml;
          }
        }
      }

      function hideActiveCall() {
        if (callTimerInterval) {
          clearInterval(callTimerInterval);
          callTimerInterval = null;
        }
        if (activeCallElement) {
          unregisterInteractive(activeCallElement);
          activeCallElement.classList.add('hiding');
          setTimeout(() => {
            activeCallElement?.remove();
            activeCallElement = null;
          }, 200);
        }
      }

      function updateCallTimer() {
        if (!callStartTime) return;
        const timerEl = document.getElementById('call-timer');
        if (!timerEl) return;

        const elapsed = Math.floor((Date.now() - callStartTime.getTime()) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      function toggleMute() {
        window.overlayAPI.sendMute();
      }

      function hangupCall() {
        window.overlayAPI.sendHangup();
      }
    </script>
  </body>
</html>
